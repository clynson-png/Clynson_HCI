<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="refresh" content="0; url=/Clynson_HCI/taurus-mobile/?mobile=1" />
    <title>HCI TAURUS Mobile</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #02070c;
        color: #f8fafc;
        font-family: Inter, Arial, sans-serif;
      }

      a {
        color: #ff7900;
        font-weight: 800;
      }
    </style>
  </head>
  <body>
    <main>
      <p>Carregando HCI TAURUS Mobile...</p>
      <p><a href="/Clynson_HCI/taurus-mobile/?mobile=1">Abrir agora</a></p>
    </main>
    <script>
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.getRegistrations()
          .then((registrations) => Promise.all(registrations.map((item) => item.unregister())))
          .finally(() => {
            window.location.replace('/Clynson_HCI/taurus-mobile/?mobile=1')
          })
      } else {
        window.location.replace('/Clynson_HCI/taurus-mobile/?mobile=1')
      }
    </script>
  </body>
</html>
